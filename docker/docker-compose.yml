version: '3.8'

services:
  # Water Utility Backend API
  water-utility-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=your_production_jwt_secret_here
      - DB_PATH=./database/water_utility.db
      - MQTT_BROKER=mqtt://mosquitto:1883
      - MQTT_TOPIC=water/utility/#
    volumes:
      - ./backend/database:/app/database
    depends_on:
      - mosquitto
    networks:
      - water-utility-network
    restart: unless-stopped

  # Water Utility Frontend
  water-utility-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - water-utility-api
    networks:
      - water-utility-network
    restart: unless-stopped

  # MQTT Broker for IoT sensors
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - water-utility-network
    restart: unless-stopped

  # PostgreSQL Database (production-ready alternative to SQLite)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: water_utility
      POSTGRES_USER: wateruser
      POSTGRES_PASSWORD: waterpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - water-utility-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wateruser -d water_utility"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - water-utility-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  water-utility-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
