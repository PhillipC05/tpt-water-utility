# Eclipse Mosquitto MQTT Broker Configuration
# For production, enable authentication and TLS below.

listener 1883
protocol mqtt

# WebSocket listener for browser clients
listener 9001
protocol websockets

# Allow anonymous connections (disable in production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections 500
max_queued_messages 1000

# Keep-alive
keepalive_interval 60

# --- Production hardening (uncomment and configure) ---
# allow_anonymous false
# password_file /mosquitto/config/passwd
# certfile /mosquitto/config/server.crt
# keyfile /mosquitto/config/server.key
# cafile /mosquitto/config/ca.crt
# tls_version tlsv1.2
